<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WhatsApp Status Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI&display=swap');
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
            touch-action: manipulation;
        }
        
        .main-layout {
            display: flex;
            flex-direction: row;
            gap: 1rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            min-height: 100vh;
        }
        
        .canvas-panel {
            position: sticky;
            top: 1rem;
            height: fit-content;
            flex: 0 0 auto;
            width: 280px;
        }
        
        .canvas-container {
            aspect-ratio: 9/16;
            width: 100%;
        }
        
        .controls-panel {
            flex: 1;
            min-width: 0;
        }
        
        textarea, input[type="text"] {
            direction: rtl;
            text-align: right;
        }
        
        .slider-container input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            height: 8px;
            border-radius: 4px;
            background: #e2e8f0;
        }
        
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }
        
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: none;
        }
        
        .slider-container.position input[type="range"]::-webkit-slider-thumb {
            background: #10b981;
        }
        
        .slider-container.position input[type="range"]::-moz-range-thumb {
            background: #10b981;
        }
        
        .fullscreen-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        
        .fullscreen-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .fullscreen-image {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            transform: translateY(0);
            transition: transform 0.3s ease;
        }
        
        .fullscreen-overlay.swiping .fullscreen-image {
            transition: none;
        }
        
        .swipe-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .slider-group {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
        }
        
        .slider-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        
        /* Mobile layout */
        @media (max-width: 768px) {
            .main-layout {
                flex-direction: column;
            }
            
            .canvas-panel {
                position: fixed;
                top: 0;
                right: 0;
                width: 120px;
                padding: 8px;
                z-index: 100;
                background: rgba(255,255,255,0.95);
                border-radius: 0 0 0 16px;
                box-shadow: -2px 2px 10px rgba(0,0,0,0.1);
            }
            
            .controls-panel {
                padding-top: 0;
                padding-right: 130px;
            }
            
            .page-title {
                padding-right: 130px;
            }
        }
        
        @media (min-width: 769px) {
            .page-title {
                display: none;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Mobile Title -->
    <h1 class="page-title text-xl font-bold text-gray-800 p-4 pb-2">יוצר סטטוס לווטסאפ</h1>
    
    <div class="main-layout">
        <!-- Canvas Panel (Sticky on right) -->
        <div class="canvas-panel">
            <div class="bg-white rounded-2xl shadow-lg p-3">
                <div class="canvas-container overflow-hidden rounded-lg relative">
                    <canvas id="previewCanvas" class="w-full h-full"></canvas>
                    
                    <!-- Fullscreen Preview Button -->
                    <button id="fullscreenBtn" class="absolute top-2 left-2 w-8 h-8 bg-white/90 hover:bg-white rounded-full shadow-md flex items-center justify-center transition-all">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
                
                <!-- Desktop title -->
                <h1 class="hidden md:block text-center text-sm font-medium text-gray-600 mt-2">יוצר סטטוס</h1>
            </div>
        </div>
        
        <!-- Controls Panel -->
        <div class="controls-panel">
            <div class="bg-white rounded-2xl shadow-lg p-5 space-y-5">
                <!-- Title Section -->
                <div class="space-y-3">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                        <span class="w-6 h-6 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-sm">1</span>
                        כותרת
                    </h2>
                    
                    <input 
                        type="text" 
                        id="titleInput" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg"
                        placeholder="הכנס כותרת..."
                        value="ציטוט היום"
                    >
                    
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Title Size Slider -->
                        <div class="slider-container slider-group">
                            <div class="slider-label">
                                <label class="text-xs font-medium text-gray-600">גודל</label>
                                <span id="titleSizeValue" class="text-xs text-gray-500">48px</span>
                            </div>
                            <input 
                                type="range" 
                                id="titleSize" 
                                min="24" 
                                max="96" 
                                value="48" 
                                class="w-full"
                            >
                        </div>
                        
                        <!-- Title Position Slider -->
                        <div class="slider-container slider-group position">
                            <div class="slider-label">
                                <label class="text-xs font-medium text-gray-600">מיקום ↕</label>
                                <span id="titlePosValue" class="text-xs text-gray-500">35%</span>
                            </div>
                            <input 
                                type="range" 
                                id="titlePos" 
                                min="5" 
                                max="95" 
                                value="64" 
                                class="w-full"
                            >
                        </div>
                    </div>
                </div>
                
                <!-- Divider -->
                <hr class="border-gray-200">
                
                <!-- Body Section -->
                <div class="space-y-3">
                    <h2 class="font-bold text-gray-800 flex items-center gap-2">
                        <span class="w-6 h-6 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-sm">2</span>
                        טקסט הציטוט
                    </h2>
                    
                    <textarea 
                        id="bodyInput" 
                        rows="4"
                        class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none text-lg resize-none"
                        placeholder="הכנס את הציטוט כאן..."
                    >החיים הם מה שאתה עושה מהם.
כל יום הוא הזדמנות חדשה.</textarea>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <!-- Body Size Slider -->
                        <div class="slider-container slider-group">
                            <div class="slider-label">
                                <label class="text-xs font-medium text-gray-600">גודל</label>
                                <span id="bodySizeValue" class="text-xs text-gray-500">36px</span>
                            </div>
                            <input 
                                type="range" 
                                id="bodySize" 
                                min="18" 
                                max="72" 
                                value="28" 
                                class="w-full"
                            >
                        </div>
                        
                        <!-- Body Position Slider -->
                        <div class="slider-container slider-group position">
                            <div class="slider-label">
                                <label class="text-xs font-medium text-gray-600">מיקום ↕</label>
                                <span id="bodyPosValue" class="text-xs text-gray-500">55%</span>
                            </div>
                            <input 
                                type="range" 
                                id="bodyPos" 
                                min="5" 
                                max="95" 
                                value="73" 
                                class="w-full"
                            >
                        </div>
                    </div>
                </div>
                
                <!-- Divider -->
                <hr class="border-gray-200">
                
                <!-- Action Buttons -->
                <div class="flex gap-3">
                    <button 
                        id="downloadBtn"
                        class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-medium py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        הורדה
                    </button>
                    <button 
                        id="shareBtn"
                        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-medium py-3 px-4 rounded-xl transition-colors flex items-center justify-center gap-2"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                        </svg>
                        שיתוף
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Fullscreen Preview Overlay -->
    <div id="fullscreenOverlay" class="fullscreen-overlay">
        <div class="close-btn" id="closeFullscreen">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </div>
        <img id="fullscreenImage" class="fullscreen-image" alt="Preview">
        <div class="swipe-hint">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3" />
            </svg>
            <span>החלק למעלה או למטה לסגירה</span>
        </div>
    </div>

    <script>
        // Background image (local file in same folder)
        const BACKGROUND_URL = 'https://pub-057be4502ead4337b9cb1eecbe535a7f.r2.dev/%D7%9C%D7%A2%D7%9E%D7%95%D7%93%20%D7%94%D7%A8%D7%90%D7%A9%D7%99/%D7%9C%D7%A1%D7%98%D7%98%D7%95%D7%A1%20%D7%9B%D7%9C%D7%9C%D7%99%20%D7%94%D7%97%D7%99%D7%A0%D7%95%D7%9A%20%D7%95%D7%94%D7%94%D7%93%D7%A8%D7%9B%D7%94%20copy.png';

        // Canvas dimensions (9:16 aspect ratio for WhatsApp Status)
        const CANVAS_WIDTH = 1080;
        const CANVAS_HEIGHT = 1920;

        // DOM Elements
        const canvas = document.getElementById('previewCanvas');
        const ctx = canvas.getContext('2d');
        const titleInput = document.getElementById('titleInput');
        const bodyInput = document.getElementById('bodyInput');
        const titleSizeSlider = document.getElementById('titleSize');
        const bodySizeSlider = document.getElementById('bodySize');
        const titlePosSlider = document.getElementById('titlePos');
        const bodyPosSlider = document.getElementById('bodyPos');
        const titleSizeValue = document.getElementById('titleSizeValue');
        const bodySizeValue = document.getElementById('bodySizeValue');
        const titlePosValue = document.getElementById('titlePosValue');
        const bodyPosValue = document.getElementById('bodyPosValue');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fullscreenOverlay = document.getElementById('fullscreenOverlay');
        const fullscreenImage = document.getElementById('fullscreenImage');
        const closeFullscreen = document.getElementById('closeFullscreen');
        const downloadBtn = document.getElementById('downloadBtn');
        const shareBtn = document.getElementById('shareBtn');

        // Background image
        let backgroundImage = new Image();
        let imageLoaded = false;
        backgroundImage.crossOrigin = 'anonymous';
        backgroundImage.onload = function() {
            imageLoaded = true;
            render();
        };
        backgroundImage.onerror = function() {
            console.warn('Failed to load background image (CORS issue?). Using gradient fallback.');
            imageLoaded = false;
            render();
        };
        backgroundImage.src = BACKGROUND_URL;

        // Initialize canvas with high DPI
        function initCanvas() {
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            canvas.style.width = '100%';
            canvas.style.height = '100%';
        }

        // Draw fallback gradient
        function drawFallbackGradient() {
            const gradient = ctx.createLinearGradient(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(0.5, '#764ba2');
            gradient.addColorStop(1, '#f53844');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
        }

        // Render the canvas
        function render() {
            // Clear canvas
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Draw background
            if (imageLoaded && backgroundImage.naturalWidth > 0) {
                ctx.drawImage(backgroundImage, 0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            } else {
                // Fallback gradient
                drawFallbackGradient();
            }
            
            // Add semi-transparent overlay for better text readability
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
            
            // Get text values
            const title = titleInput.value;
            const body = bodyInput.value;
            const titleSize = parseInt(titleSizeSlider.value) * 2; // Scale for high DPI
            const bodySize = parseInt(bodySizeSlider.value) * 2;
            const titlePosPercent = parseInt(titlePosSlider.value) / 100;
            const bodyPosPercent = parseInt(bodyPosSlider.value) / 100;
            
            // Configure text rendering
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            
            // Draw title (bold)
            ctx.font = `bold ${titleSize}px 'Calibri', 'Segoe UI', Arial, sans-serif`;
            const titleY = CANVAS_HEIGHT * titlePosPercent;
            wrapText(ctx, title, CANVAS_WIDTH / 2, titleY, CANVAS_WIDTH - 120, titleSize * 1.3);
            
            // Draw body text (regular)
            ctx.font = `${bodySize}px 'Calibri', 'Segoe UI', Arial, sans-serif`;
            const bodyY = CANVAS_HEIGHT * bodyPosPercent;
            wrapText(ctx, body, CANVAS_WIDTH / 2, bodyY, CANVAS_WIDTH - 100, bodySize * 1.4);
        }

        // Word wrap function with RTL support
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            // Split by explicit line breaks first
            const paragraphs = text.split('\n');
            const allLines = [];
            
            paragraphs.forEach(paragraph => {
                if (paragraph.trim() === '') {
                    allLines.push('');
                    return;
                }
                
                const words = paragraph.split(' ');
                let line = '';
                
                for (let i = 0; i < words.length; i++) {
                    const testLine = line + words[i] + ' ';
                    const metrics = ctx.measureText(testLine);
                    
                    if (metrics.width > maxWidth && i > 0) {
                        allLines.push(line.trim());
                        line = words[i] + ' ';
                    } else {
                        line = testLine;
                    }
                }
                allLines.push(line.trim());
            });
            
            // Calculate starting Y to center the text block
            const totalHeight = allLines.length * lineHeight;
            let startY = y - totalHeight / 2 + lineHeight / 2;
            
            // Draw each line
            allLines.forEach((line, index) => {
                if (line) {
                    // Use direction for proper RTL rendering
                    ctx.save();
                    ctx.direction = 'rtl';
                    ctx.fillText(line, x, startY + index * lineHeight);
                    ctx.restore();
                }
            });
        }

        // Generate image blob
        async function generateBlob() {
            return new Promise((resolve) => {
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.95);
            });
        }

        // Download image
        async function downloadImage() {
            const blob = await generateBlob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `whatsapp-status-${Date.now()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Share image
        async function shareImage() {
            try {
                const blob = await generateBlob();
                const file = new File([blob], 'whatsapp-status.jpg', { type: 'image/jpeg' });
                
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'WhatsApp Status',
                        text: titleInput.value || 'Check out my status!'
                    });
                } else {
                    // Fallback to download
                    alert('השיתוף לא נתמך בדפדפן זה. התמונה תורד במקום.');
                    downloadImage();
                }
            } catch (error) {
                if (error.name !== 'AbortError') {
                    console.error('Share failed:', error);
                    downloadImage();
                }
            }
        }

        // Fullscreen preview
        function openFullscreen() {
            const dataUrl = canvas.toDataURL('image/jpeg', 0.95);
            fullscreenImage.src = dataUrl;
            fullscreenOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFullscreenPreview() {
            fullscreenOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // Swipe gesture handling
        let touchStartY = 0;
        let touchCurrentY = 0;
        let isSwiping = false;

        fullscreenOverlay.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            isSwiping = true;
            fullscreenOverlay.classList.add('swiping');
        }, { passive: true });

        fullscreenOverlay.addEventListener('touchmove', (e) => {
            if (!isSwiping) return;
            touchCurrentY = e.touches[0].clientY;
            const deltaY = touchCurrentY - touchStartY;
            fullscreenImage.style.transform = `translateY(${deltaY}px)`;
        }, { passive: true });

        fullscreenOverlay.addEventListener('touchend', () => {
            if (!isSwiping) return;
            const deltaY = touchCurrentY - touchStartY;
            
            // If swiped more than 100px, close the preview
            if (Math.abs(deltaY) > 100) {
                closeFullscreenPreview();
            }
            
            // Reset
            fullscreenImage.style.transform = '';
            fullscreenOverlay.classList.remove('swiping');
            isSwiping = false;
            touchStartY = 0;
            touchCurrentY = 0;
        });

        // Mouse wheel support for desktop
        fullscreenOverlay.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 50) {
                closeFullscreenPreview();
            }
        });

        // Click outside to close
        fullscreenOverlay.addEventListener('click', (e) => {
            if (e.target === fullscreenOverlay) {
                closeFullscreenPreview();
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (fullscreenOverlay.classList.contains('active') && e.key === 'Escape') {
                closeFullscreenPreview();
            }
        });

        // Event listeners
        titleInput.addEventListener('input', render);
        bodyInput.addEventListener('input', render);
        
        titleSizeSlider.addEventListener('input', () => {
            titleSizeValue.textContent = `${titleSizeSlider.value}px`;
            render();
        });
        
        bodySizeSlider.addEventListener('input', () => {
            bodySizeValue.textContent = `${bodySizeSlider.value}px`;
            render();
        });
        
        titlePosSlider.addEventListener('input', () => {
            titlePosValue.textContent = `${titlePosSlider.value}%`;
            render();
        });
        
        bodyPosSlider.addEventListener('input', () => {
            bodyPosValue.textContent = `${bodyPosSlider.value}%`;
            render();
        });
        
        fullscreenBtn.addEventListener('click', openFullscreen);
        closeFullscreen.addEventListener('click', closeFullscreenPreview);
        downloadBtn.addEventListener('click', downloadImage);
        shareBtn.addEventListener('click', shareImage);

        // Initialize
        backgroundImage.onload = render;
        initCanvas();
        render();
    </script>
</body>
</html>
